on_http_request:
  - actions:
      # validate basic credentials
      - type: basic-auth
        config:
          credentials:
            - user01:BP5@Fy!U
            - user02:A6#?ioa=
     
      # dynamically inject the user into a custom header 
      - type: add-headers
        config:
          headers:
            x-user-name: "${actions.ngrok.basic_auth.credentials.username}"

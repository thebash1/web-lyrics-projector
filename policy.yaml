on_http_request:
  - actions:
      # validate basic credentials
      - type: basic-auth
        config:
          credentials:
            - user01:${sys.env.USER01_PASSWORD}
            - user02:${sys.env.USER02_PASSWORD} 

      # dynamically inject the user into a custom header 
      - type: add-headers
        config:
          headers:
            x-user-name: "${actions.ngrok.basic_auth.credentials.username}"
